name: Build Family Tree APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Auto Create Project & Fix Gradle & Build
        run: |
          # إنشاء المشروع
          flutter create --org com.aldkheel --project-name family_tree_app base_project
          cd base_project
          
          # نسخ ملف الشجرة الخاص بك
          cp ../genealogy_canvas_widget.dart lib/
          
          # كتابة ملف main.dart المطور
          cat << 'EXTRA' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'genealogy_canvas_widget.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(body: SafeArea(child: GenealogyCanvas(elementsJson: '{}', onElementsChanged: (json) async => null))),
          ));
          EXTRA
          
          # تعديل إعدادات أندرويد لتتوافق مع جافا 17 وتتخطى خطأ التجميع
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.20"/g' android/build.gradle
          sed -i 's/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:8.1.0"/g' android/build.gradle
          
          # تحميل المكتبات والبناء النهائي
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
