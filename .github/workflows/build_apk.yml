name: Build Family Tree APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Project & Safe Build APK
        run: |
          # إنشاء مشروع فلوتر نظيف وتخطي مشاكل الإعدادات
          flutter create --org com.aldkheel --project-name family_tree_app base_project
          cd base_project
          
          # نسخ ملف الشجرة إلى المجلد الصحيح
          cp ../genealogy_canvas_widget.dart lib/
          
          # كتابة ملف main.dart الصحيح 100% بدون أي خطأ إملائي في الدوال
          cat << 'EXTRA' > lib/main.dart
          import 'package:flutter/material.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                debugShowCheckedModeBanner: false,
                home: Scaffold(
                  body: SafeArea(
                    child: Center(
                      child: Text("Family Tree App"),
                    ),
                  ),
                ),
              );
            }
          }
          EXTRA
          
          # جلب المكتبات وبناء الـ APK مباشرة
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
