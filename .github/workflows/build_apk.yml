name: Build Family Tree APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Project & Build Real Family Tree
        run: |
          flutter create --org com.aldkheel --project-name family_tree_app base_project
          cd base_project
          
          # نسخ ملف الشجرة الخاص بك
          cp ../genealogy_canvas_widget.dart lib/
          
          # كتابة ملف main.dart ليتصل مباشرة بالـ Widget الخاصة بك
          cat << 'EXTRA' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'genealogy_canvas_widget.dart';
          
          void main() {
            runApp(const MyApp());
          }
          
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: Scaffold(
                  body: SafeArea(
                    // هنا قمنا باستدعاء الـ Widget الفعلية الخاصة بك لتشغيل الشجرة
                    child: GenealogyCanvas(
                      elementsJson: '{}', 
                      onElementsChanged: (json) async => null,
                    ),
                  ),
                ),
              );
            }
          }
          EXTRA
          
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
