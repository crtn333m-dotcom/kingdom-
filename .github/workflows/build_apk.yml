name: Build Family Tree Web App
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create & Build Web
        run: |
          flutter create --org com.aldkheel --project-name family_tree_app base_project
          cd base_project
          cp ../genealogy_canvas_widget.dart lib/
          cat << 'EXTRA' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'genealogy_canvas_widget.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(body: SafeArea(child: GenealogyCanvas(elementsJson: '{}', onElementsChanged: (json) async => null))),
          ));
          EXTRA
          flutter pub get
          flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: family-tree-web
          path: base_project/build/web/
