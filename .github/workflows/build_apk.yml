name: Build Family Tree APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Force Clean Setup & Inject Code
        run: |
          # مسح شامل لأي مجلدات سابقة لضمان التحديث 100%
          rm -rf base_project
          
          flutter create --org com.aldkheel --project-name family_tree_app base_project
          cd base_project
          
          # مسح كاش فلوتر محلياً داخل السيرفر
          flutter clean
          
          # كتابة كود الشجرة المطور والمحسّن مباشرة
          cat << 'EXTRA' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() => runApp(const MaterialApp(
            debugShowCheckedModeBanner: false,
            home: FamilyTreeHomeScreen(),
          ));

          class FamilyTreeHomeScreen extends StatefulWidget {
            const FamilyTreeHomeScreen({super.key});
            @override
            State<FamilyTreeHomeScreen> createState() => _FamilyTreeHomeScreenState();
          }

          class _FamilyTreeHomeScreenState extends State<FamilyTreeHomeScreen> {
            final List<Map<String, dynamic>> _elements = [
              {'id': '1', 'name': 'الجد الأكبر', 'type': 'trunk', 'x': 150.0, 'y': 80.0},
              {'id': '2', 'name': 'الابن الأول', 'type': 'branch', 'x': 60.0, 'y': 220.0},
              {'id': '3', 'name': 'الابن الثاني', 'type': 'branch', 'x': 240.0, 'y': 220.0},
            ];

            void _addElement() {
              setState(() {
                _elements.add({
                  'id': DateTime.now().millisecondsSinceEpoch.toString(),
                  'name': 'عضو جديد',
                  'type': 'leaf',
                  'x': 150.0,
                  'y': 380.0
                });
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFFF3ECDD),
                appBar: AppBar(
                  title: const Text('شجرة نسب آل الدخيل', style: TextStyle(color: Colors.white, fontSize: 18)),
                  backgroundColor: const Color(0xFF6B4226),
                  centerTitle: true,
                ),
                body: Stack(
                  children: [
                    Positioned.fill(
                      child: CustomPaint(
                        painter: TreePainter(_elements),
                      ),
                    ),
                    ..._elements.map((el) {
                      return Positioned(
                        left: el['x'],
                        top: el['y'],
                        child: GestureDetector(
                          onPanUpdate: (details) {
                            setState(() {
                              el['x'] += details.delta.dx;
                              el['y'] += details.delta.dy;
                            });
                          },
                          child: Container(
                            padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 8),
                            decoration: BoxDecoration(
                              color: el['type'] == 'trunk' ? const Color(0xFF6B4226) : const Color(0xFF4C8C4A),
                              borderRadius: BorderRadius.circular(8),
                              boxShadow: const [BoxShadow(color: Colors.black12, blurRadius: 4)],
                            ),
                            child: Text(
                              el['name'],
                              style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold, fontSize: 14),
                            ),
                          ),
                        ),
                      );
                    }).toList(),
                    const Positioned(
                      bottom: 30,
                      left: 0,
                      right: 0,
                      child: Center(
                        child: Text(
                          'عمل هذه الشجرة بتطبيق حسين الدخيل',
                          style: TextStyle(color: Color(0xFF6B4226), fontWeight: FontWeight.bold, fontSize: 13),
                        ),
                      ),
                    ),
                  ],
                ),
                floatingActionButton: FloatingActionButton(
                  onPressed: _addElement,
                  backgroundColor: const Color(0xFF6B4226),
                  child: const Icon(Icons.add, color: Colors.white),
                ),
              );
            }
          }

          class TreePainter extends CustomPainter {
            final List<Map<String, dynamic>> elements;
            TreePainter(this.elements);

            @override
            void paint(Canvas canvas, Size size) {
              final paint = Paint()
                ..color = const Color(0xFF8A5A33)
                ..strokeWidth = 3
                ..style = PaintingStyle.stroke;

              if (elements.length > 1) {
                var root = elements.firstWhere((e) => e['type'] == 'trunk');
                for (var el in elements) {
                  if (el['id'] != root['id']) {
                    canvas.drawLine(
                      Offset(root['x'] + 40, root['y'] + 15),
                      Offset(el['x'] + 40, el['y'] + 15),
                      paint,
                    );
                  }
                }
              }
            }

            @override
            bool shouldRepaint(covariant CustomPainter oldDelegate) => true;
          }
          EXTRA
          
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
